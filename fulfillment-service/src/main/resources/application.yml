spring:
  application:
    name: fulfillment-service

  # DATABASE CONFIGURATION
  datasource:
    url: ${FULFILLMENT_DB_URL:jdbc:postgresql://localhost:5432/ticketblitz_fulfillment}
    username: ${POSTGRES_USER:ticketblitz}
    password: ${POSTGRES_PASSWORD:ticketblitz_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50 # high batch size for bulk ticket inserts
        order_inserts: true
        order_updates: true

  # FLYWAY CONFIGURATION
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # RABBITMQ CONFIGURATION (Event consumption)
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:ticketblitz}
    password: ${RABBITMQ_PASSWORD:ticketblitz-password}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false # route to DLQ instead of requeue
        retry:
          enabled: false # broker level retry enabled
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2.0
          max-interval: 10000ms
        concurrency: 3 # parallel consumers
        max-concurrency: 10
        prefetch: 10

# SERVER CONFIGURATION
server:
  port: 8083
  error:
    include-message: always
    include-binding-errors: always

# EUREKA CLIENT CONFIGURATION
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    registerWithEureka: true
    fetchRegistry: true
  instance:
    preferIpAddress: true
    lease-renewal-interval-in-seconds: 30

# ACTUATOR CONFIGURATION
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,httpexchanges
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always

# LOGGING CONFIGURATION
logging:
  level:
    com.ticketblitz.fulfillment: DEBUG
    org.springframework.amqp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SPRINGDOC CONFIGURATION
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true