# Docker profile overrides - all hosts point to Docker Compose service names
spring:
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/ticketblitz_users
  flyway:
    url: jdbc:postgresql://postgres:5432/ticketblitz_users
  data:
    redis:
      host: redis

eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    prefer-ip-address: true
