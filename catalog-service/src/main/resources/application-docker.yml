# Docker profile overrides - all hosts point to Docker Compose service names
spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/ticketblitz_catalog
  data:
    redis:
      host: redis

eureka:
  client:
    serviceUrl:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    prefer-ip-address: true
