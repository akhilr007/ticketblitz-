spring:
  application:
    name: booking-service

  # DATABASE CONFIGURATION
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketblitz_booking
    username: ticketblitz
    password: ticketblitz_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30 # higher than catalog(write-heavy)
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # FLYWAY CONFIGURATION
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # REDIS CONFIGURATION (DISTRIBUTED LOCKING)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  # RABBITMQ CONFIGURATION (Event publishing)
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:ticketblitz}
    password: ${RABBITMQ_PASSWORD:ticketblitz-password}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3

# REDISSON CONFIGURATION (DISTRIBUTED LOCKS)
redisson:
  single-server-config:
    address: redis://localhost:6379
    connection-pool-size: 32
    connection-minimum-idle-size: 8
    timeout: 3000
    retry-attempts: 3
    retry-interval: 1500

# SERVER CONFIGURATION
server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

# EUREKA CLIENT CONFIGURATION
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    registerWithEureka: true
    fetchRegistry: true
  instance:
    preferIpAddress: true
    lease-renewal-interval-in-seconds: 30

# FEIGN CLIENT CONFIGURATION
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
      catalog-service:
        connectTimeout: 3000
        readTimeout: 5000

# RESILIENCE4J CONFIGURATION (circuit breaker)
resilience4j:
  circuitbreaker:
    instances:
      catalogService:
        registerHealthIndicator: true
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:
      catalogService:
        maxAttempts: 3
        waitDuration: 1000
        exponentialBackoffMultiplier: 2

# ACTUATOR CONFIGURATION
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always

# LOGGING CONFIGURATION
logging:
  level:
    com.ticketblitz.booking: DEBUG
    org.springframework.amqp: DEBUG
    org.redisson: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# SPRINGDOC CONFIGURATION
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# BOOKING SERVICE CONFIGURATION
booking:
  reservation:
    timeout-minutes: 10 # seats held for 10 minutes
    cleanup-interval-minutes: 5 # cleanup job runs every 5 minutes
  payment:
    mock-enabled: true # use mock payment gateway
    processing-delay-ms: 2000 # simulate payment processing time